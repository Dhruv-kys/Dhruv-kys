<svg width="900" height="190" viewBox="0 0 900 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00ff88" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- bg -->
  <rect width="900" height="190" fill="#0d1117"/>
  <rect width="900" height="190" fill="url(#grid)"/>

  <!-- left gradient accent -->
  <rect width="340" height="190" fill="url(#fade)"/>

  <!-- left border bar -->
  <rect x="0" y="0" width="4" height="190" fill="#00ff88"/>

  <!-- top / bottom hairlines -->
  <line x1="4" y1="0" x2="900" y2="0" stroke="#30363d" stroke-width="1"/>
  <line x1="4" y1="189" x2="900" y2="189" stroke="#30363d" stroke-width="1"/>

  <!-- prompt line -->
  <text x="26" y="60" font-family="'Courier New', Courier, monospace" font-size="14" fill="#8b949e">~/dhruv-kys $ <tspan fill="#00ff88">whoami</tspan></text>

  <!-- name -->
  <text x="26" y="120" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="54" fill="#00ff88" letter-spacing="-1">DHRUV DIWAKIRTI</text>

  <!-- tagline -->
  <text x="28" y="152" font-family="'Courier New', Courier, monospace" font-size="15" fill="#8b949e">software engineer  ·  ai systems  ·  llm pipelines  ·  backend infra</text>

  <!-- cursor -->
  <rect x="28" y="162" width="11" height="18" fill="#00ff88" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- corner tag -->
  <text x="870" y="175" font-family="'Courier New', Courier, monospace" font-size="11" fill="#30363d" text-anchor="end">JSS NOIDA '27</text>
</svg>